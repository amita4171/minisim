name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Check imports
        run: |
          python -c "from src.archetypes import BACKGROUNDS; print(f'{len(BACKGROUNDS)} archetypes')"
          python -c "from src.aggregator import aggregate; print('aggregator OK')"
          python -c "from src.offline_engine import swarm_score_offline; print('offline engine OK')"
          python -c "from src.cross_platform import similarity; print('cross-platform OK')"
          python -c "from src.database import Database; print('database OK')"
